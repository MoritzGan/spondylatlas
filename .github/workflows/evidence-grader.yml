name: Evidence Grader Agent
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: agents/package-lock.json }
      - run: npm install
        working-directory: agents
      - run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > /tmp/sa-key.json
      - run: npx tsx evidence-grader.ts
        working-directory: agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
      - if: always()
        run: rm -f /tmp/sa-key.json
