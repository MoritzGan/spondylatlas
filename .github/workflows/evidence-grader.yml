name: Evidence-grader Agent
on:
  schedule:
    - cron: '*/20 * * * *
10 */1 * * *
30 */2 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: agents/package-lock.json }
      - run: npm install
        working-directory: agents
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json
      - name: Run agent
        run: npx tsx evidence-grader.ts
        working-directory: agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
      - if: always()
        run: rm -f /tmp/sa-key.json
