name: Hypothesis Critic Agent
on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: agents/package-lock.json }
      - run: npm ci
        working-directory: agents
      - name: Setup Firebase credentials
        run: echo "$SA_JSON" > /tmp/sa-key.json
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Run agent
        run: npx tsx hypothesis-critic.ts
        working-directory: agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
