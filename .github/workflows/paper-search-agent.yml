name: Paper Search Agent

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  paper-search:
    runs-on: ubuntu-latest
    permissions:
      contents: read


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agents/package-lock.json

      - name: Install dependencies
        working-directory: agents
        run: npm ci

      - name: Setup Firebase credentials
        run: echo "$SA_JSON" > /tmp/sa-key.json
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Run paper search agent
        working-directory: agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
        run: npx tsx paper-search-agent.ts
